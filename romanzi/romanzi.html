<script>

    targetDiv.style.display = "inline-block";
	targetPic.style.filter = "blur(1px)";
	targetDiv.style.transformOrigin = "0 50% !important";
	targetDiv.style.transition = "all 1s ease-in-out";
  } else {
    targetDiv.style.display = "none";
	targetPic.style.filter = "none";
  }
};
</script>
